<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebCalc — Python</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e, #0f3460);
      color: #eee;
    }
    .app { width: 100%; max-width: 380px; padding: 20px; text-align: center; }
    h1 { font-weight: 300; letter-spacing: 2px; }
    .subtitle { color: #8892b0; font-size: 0.85rem; margin: 4px 0 20px; }
    .calculator {
      background: #1e1e2f;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .display {
      background: #0d0d1a;
      border-radius: 12px;
      padding: 20px 16px;
      font-size: 2.5rem;
      text-align: right;
      min-height: 70px;
      margin-bottom: 16px;
      border: 1px solid #2a2a4a;
    }
    .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    form { display: contents; }
    button {
      border: none;
      border-radius: 12px;
      padding: 18px;
      font-size: 1.3rem;
      cursor: pointer;
      font-family: inherit;
      color: #fff;
    }
    .btn-num { background: #2d2d44; }
    .btn-op { background: #e94560; }
    .btn-fn { background: #4a4a6a; }
    .btn-eq { background: #00b894; }
    .btn-zero { grid-column: span 2; }
    .error {
      margin-top: 12px;
      padding: 10px;
      background: #c0392b;
      border-radius: 8px;
      font-size: 0.9rem;
    }
    footer { margin-top: 16px; font-size: 0.75rem; color: #556; }
  </style>
</head>
<body>
  <div class="app">
    <h1>WebCalc</h1>
    <p class="subtitle">Веб-калькулятор на Python (Flask)</p>

    <div class="calculator">
      <div class="display">{{ display }}</div>

      <div class="buttons">
        <form method="post"><input type="hidden" name="action" value="clear"><button type="submit" class="btn-fn">C</button></form>
        <form method="post"><input type="hidden" name="action" value="backspace"><button type="submit" class="btn-fn">⌫</button></form>
        <form method="post"><input type="hidden" name="action" value="percent"><button type="submit" class="btn-fn">%</button></form>
        <form method="post"><input type="hidden" name="action" value="operator"><input type="hidden" name="value" value="/"><button type="submit" class="btn-op">÷</button></form>

        <form method="post"><input type="hidden" name="action" value="digit"><input type="hidden" name="value" value="7"><button type="submit" class="btn-num">7</button></form>
        <form method="post"><input type="hidden" name="action" value="digit"><input type="hidden" name="value" value="8"><button type="submit" class="btn-num">8</button></form>
        <form method="post"><input type="hidden" name="action" value="digit"><input type="hidden" name="value" value="9"><button type="submit" class="btn-num">9</button></form>
        <form method="post"><input type="hidden" name="action" value="operator"><input type="hidden" name="value" value="*"><button type="submit" class="btn-op">×</button></form>

        <form method="post"><input type="hidden" name="action" value="digit"><input type="hidden" name="value" value="4"><button type="submit" class="btn-num">4</button></form>
        <form method="post"><input type="hidden" name="action" value="digit"><input type="hidden" name="value" value="5"><button type="submit" class="btn-num">5</button></form>
        <form method="post"><input type="hidden" name="action" value="digit"><input type="hidden" name="value" value="6"><button type="submit" class="btn-num">6</button></form>
        <form method="post"><input type="hidden" name="action" value="operator"><input type="hidden" name="value" value="-"><button type="submit" class="btn-op">−</button></form>

        <form method="post"><input type="hidden" name="action" value="digit"><input type="hidden" name="value" value="1"><button type="submit" class="btn-num">1</button></form>
        <form method="post"><input type="hidden" name="action" value="digit"><input type="hidden" name="value" value="2"><button type="submit" class="btn-num">2</button></form>
        <form method="post"><input type="hidden" name="action" value="digit"><input type="hidden" name="value" value="3"><button type="submit" class="btn-num">3</button></form>
        <form method="post"><input type="hidden" name="action" value="operator"><input type="hidden" name="value" value="+"><button type="submit" class="btn-op">+</button></form>

        <form method="post"><input type="hidden" name="action" value="digit"><input type="hidden" name="value" value="0"><button type="submit" class="btn-num btn-zero">0</button></form>
        <form method="post"><input type="hidden" name="action" value="decimal"><button type="submit" class="btn-num">.</button></form>
        <form method="post"><input type="hidden" name="action" value="equals"><button type="submit" class="btn-eq">=</button></form>
      </div>

      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}
    </div>

    <footer>Версия 2.0 | Python + Flask</footer>
  </div>
</body>
</html>
